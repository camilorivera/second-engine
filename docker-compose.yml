services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-secondengine}
      POSTGRES_USER: ${POSTGRES_USER:-secondengine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secondengine}"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: ./worker
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    volumes:
      - ./worker:/app

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-changeme}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:8
    profiles: [debug]
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}

  api:
    build: ./api
    profiles: [api]
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  trivy:
    image: aquasec/trivy:latest
    profiles: [security]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/scan

volumes:
  postgres_data:
  grafana_data:
