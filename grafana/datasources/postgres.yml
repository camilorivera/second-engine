apiVersion: 1

datasources:
  - name: PostgreSQL
    type: postgres
    url: postgres:5432
    database: ${POSTGRES_DB:-secondengine}
    user: ${POSTGRES_USER:-secondengine}
    secureJsonData:
      password: ${POSTGRES_PASSWORD:-changeme}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false
